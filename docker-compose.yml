version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: anime-forum-db
    environment:
      POSTGRES_USER: anime
      POSTGRES_PASSWORD: anime123
      POSTGRES_DB: anime_forum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - anime-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis 缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: anime-forum-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - anime-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # Express 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anime-forum-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://anime:anime123@postgres:5432/anime_forum
      REDIS_URL: redis://redis:6379
      PORT: 3001
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - anime-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anime-forum-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://14.103.8.40:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - anime-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  redis_data:

networks:
  anime-network:
    driver: bridge
